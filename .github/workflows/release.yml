name: Release PDF

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra pandoc librsvg2-bin

      - name: Build PDF
        run: make pdf

      - name: Upload PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/pdf/*.pdf
